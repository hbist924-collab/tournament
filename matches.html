<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2c3e50; --gold: #f1c40f; --blue: #3498db; --success: #27ae60; --warning: #f39c12; --light: #ecf0f1; --danger: #e74c3c; }
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; padding-bottom: 80px; }
        .tabs { display: flex; background: var(--primary); position: sticky; top: 0; z-index: 1000; }
        .tab { flex: 1; color: #ccc; padding: 15px 0; text-align: center; cursor: pointer; font-weight: bold; font-size: 0.85rem; border-bottom: 3px solid transparent; }
        .tab.active { color: white; border-bottom: 3px solid var(--gold); }
        .container { padding: 15px; }
        .match-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid var(--blue); position: relative; }
        .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .game-name { font-weight: bold; color: var(--primary); font-size: 1.1rem; }
        .entry-fee { color: var(--success); font-weight: bold; }
        .match-body { font-size: 0.85rem; color: #555; line-height: 1.6; }
        .room-code-box { background: var(--light); padding: 8px; border-radius: 5px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; border: 1px dashed #bdc3c7; }
        .room-code-box b { color: var(--danger); font-size: 1rem; }
        .btn-group { margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap; }
        .action-btn { flex: 1; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; text-align: center; text-decoration: none; display: inline-block; font-size: 0.8rem; }
        .join-btn { background: var(--blue); }
        .win-btn { background: var(--success); }
        .loss-btn { background: var(--danger); }
        .chat-btn { background: #8e44ad; }
        .copy-btn { background: var(--primary); padding: 5px 10px; font-size: 0.7rem; border-radius: 3px; border: none; color: white; cursor: pointer; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 15px; text-align: center; }
        .status-badge { display: block; width: 100%; padding: 10px; border-radius: 5px; font-weight: bold; font-size: 0.85rem; text-align: center; box-sizing: border-box; }
        
        #chatMessages { height: 300px; overflow-y: auto; border: 1px solid #eee; padding: 10px; display: flex; flex-direction: column; gap: 8px; background: #fafafa; margin-bottom: 10px; border-radius: 8px; }
        .msg { padding: 8px 12px; border-radius: 15px; font-size: 0.85rem; max-width: 80%; line-height: 1.4; position: relative; }
        .msg.sent { align-self: flex-end; background: #dcf8c6; color: #333; border-bottom-right-radius: 2px; }
        .msg.received { align-self: flex-start; background: #fff; color: #333; border: 1px solid #ddd; border-bottom-left-radius: 2px; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { text-align: center; color: #777; font-size: 0.8rem; text-decoration: none; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" id="tab-open" onclick="showTab('open')">JOIN MATCH</div>
        <div class="tab" id="tab-waiting" onclick="showTab('waiting')">WAITING</div>
        <div class="tab" id="tab-result" onclick="showTab('result')">RESULT</div>
    </div>

    <div class="container" id="matchContainer"></div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Upload Win Proof</h3>
            <p style="font-size: 0.8rem;">कृपया गेमको अन्तिम नतिजाको Screenshot यहाँ हाल्नुहोस्।</p>
            <input type="file" id="proofFile" accept="image/*" style="margin: 15px 0;">
            <div class="btn-group">
                <button class="action-btn join-btn" id="confirmProofBtn">Submit & Continue</button>
                <button class="action-btn" style="background:#555" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div id="chatModal" class="modal">
        <div class="modal-content" style="max-height: 90vh;">
            <h3>Opponent Chat</h3>
            <div id="chatMessages"></div>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="chatInput" placeholder="मेसेज लेख्नुहोस्..." style="flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                <button class="action-btn join-btn" id="sendMsgBtn" style="flex: 0 0 70px;">Send</button>
            </div>
            <button class="action-btn" style="background:#555; margin-top: 10px;" onclick="closeChat()">Close</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><br>Home</a>
        <a href="matches.html" class="nav-item active"><i class="fas fa-gamepad"></i><br>Matches</a>
        <a href="notice.html" class="nav-item"><i class="fas fa-bullhorn"></i><br>Notice</a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><br>Profile</a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, update, push, get, set, off, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDmrsJq_hxoaSwbl_Y8U8eOZdTVBb0fBIo",
            authDomain: "ludo-king-b051a.firebaseapp.com",
            projectId: "ludo-king-b051a",
            storageBucket: "ludo-king-b051a.firebasestorage.app",
            messagingSenderId: "311482948017",
            appId: "1:311482948017:web:4a986ca1416b6e456e0590"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const IMGBB_API_KEY = "3306f682976a47a34846e10eaa74c4f6";

        let currentTab = 'open';
        let userBalance = 0;
        let userUid = "";
        let activeChatId = "";

        window.showTab = (tabName) => {
            currentTab = tabName;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');
            renderMatches();
        };

        window.closeModal = () => document.getElementById('uploadModal').style.display = 'none';

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userUid = user.uid;
                onValue(ref(db, `users/${user.uid}`), (snapshot) => {
                    userBalance = snapshot.val()?.balance || 0;
                });
                renderMatches();
            } else { window.location.href = "index.html"; }
        });

        function renderMatches() {
            const container = document.getElementById('matchContainer');
            onValue(ref(db, 'matches'), (snapshot) => {
                container.innerHTML = "";
                const data = snapshot.val();
                if (!data) return container.innerHTML = `<p style="text-align:center; color:#888; margin-top:50px;">म्याच फेला परेन।</p>`;

                let hasMatches = false;
                Object.keys(data).forEach(key => {
                    const match = data[key];
                    let isVisible = false;
                    const myClaim = (match.creatorId === userUid) ? match.creator_claim : match.joiner_claim;

                    if (currentTab === 'open' && match.status === 'open' && match.creatorId !== userUid) isVisible = true;
                    if (currentTab === 'waiting' && match.status === 'waiting' && (match.creatorId === userUid || match.joinerId === userUid) && !myClaim) isVisible = true;
                    if (currentTab === 'result' && (match.creatorId === userUid || match.joinerId === userUid) && myClaim) isVisible = true;

                    if (isVisible) {
                        hasMatches = true;
                        let actionBtn = "";
                        let roomCodeHtml = "";

                        if (currentTab === 'open') {
                            actionBtn = `<button class="action-btn join-btn" onclick="joinMatch('${key}', ${match.entry})">JOIN NOW</button>`;
                        } 
                        else if (currentTab === 'waiting') {
                            roomCodeHtml = `<div class="room-code-box"><span>Code: <b>${match.roomCode}</b></span><button class="copy-btn" onclick="copyCode('${match.roomCode}')">COPY</button></div>`;
                            actionBtn = `
                                <button class="action-btn chat-btn" onclick="openChat('${key}')"><i class="fas fa-comments"></i> CHAT</button>
                                <button class="action-btn win-btn" onclick="openResultModal('${key}', 'win')">I WIN</button>
                                <button class="action-btn loss-btn" onclick="openResultModal('${key}', 'loss')">I LOSS</button>`;
                        } 
                        else if (currentTab === 'result') {
                            if (match.status === "completed") {
                                if (match.winnerId === userUid) {
                                    actionBtn = `<div class="status-badge" style="background:#e8f5e9; color:#27ae60; border: 1px solid #27ae60;"><i class="fas fa-trophy"></i> Result: WIN (Auto Paid)</div>`;
                                } else {
                                    actionBtn = `<div class="status-badge" style="background:#ffebee; color:#e74c3c; border: 1px solid #e74c3c;"><i class="fas fa-times-circle"></i> Result: LOSS</div>`;
                                }
                            } else if (match.status === "dispute") {
                                actionBtn = `<div class="status-badge" style="background:#fff3e0; color:#e67e22; border: 1px solid #e67e22;"><i class="fas fa-exclamation-triangle"></i> Dispute: Admin Checking</div>`;
                            } else {
                                actionBtn = `<div class="status-badge" style="background:#f0f0f0; color:#888; border: 1px solid #ddd;"><i class="fas fa-hourglass-half"></i> Waiting for Opponent Result</div>`;
                            }
                        }

                        container.innerHTML += `
                            <div class="match-card" style="border-left-color: ${currentTab === 'open' ? '#3498db' : (currentTab === 'waiting' ? '#f39c12' : '#27ae60')}">
                                <div class="match-header"><span class="game-name">${match.game}</span><span class="entry-fee">Fee: रू ${match.entry}</span></div>
                                <div class="match-body"><b>Prize:</b> रू ${match.prize} <br>${roomCodeHtml}</div>
                                <div class="btn-group">${actionBtn}</div>
                            </div>`;
                    }
                });
                if (!hasMatches) container.innerHTML = `<p style="text-align:center; color:#888; margin-top:50px;">यो सेक्सन खाली छ।</p>`;
            });
        }

        // Result Submission Logic with Auto-Pay
        window.openResultModal = (matchId, claim) => {
            document.getElementById('uploadModal').style.display = 'flex';
            document.getElementById('modalTitle').innerText = (claim === 'win') ? "Upload Winning Screenshot" : "Upload Loss Screenshot";
            
            document.getElementById('confirmProofBtn').onclick = async () => {
                const fileInput = document.getElementById('proofFile');
                if (fileInput.files.length === 0) return alert("कृपया Screenshot छान्नुहोस्!");

                const submitBtn = document.getElementById('confirmProofBtn');
                submitBtn.innerText = "Processing...";
                submitBtn.disabled = true;

                try {
                    // Upload to ImgBB
                    const formData = new FormData();
                    formData.append("image", fileInput.files[0]);
                    const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
                    const result = await response.json();

                    if (result.success) {
                        const proofUrl = result.data.url;
                        const matchRef = ref(db, `matches/${matchId}`);
                        const matchSnap = await get(matchRef);
                        const match = matchSnap.val();

                        let updates = {};
                        if (match.creatorId === userUid) {
                            updates['creator_claim'] = claim;
                            updates['creatorProof'] = proofUrl;
                        } else {
                            updates['joiner_claim'] = claim;
                            updates['joinerProof'] = proofUrl;
                        }

                        await update(matchRef, updates);
                        
                        // Check for Auto-Winner
                        checkAutoPayment(matchId);
                        
                        alert("Result submitted successfully!");
                        closeModal();
                        showTab('result');
                    } else { alert("Upload failed!"); }
                } catch (e) { alert("Error: " + e.message); }
                finally { submitBtn.innerText = "Submit & Continue"; submitBtn.disabled = false; }
            };
        };

        async function checkAutoPayment(matchId) {
            const matchRef = ref(db, `matches/${matchId}`);
            const snap = await get(matchRef);
            const m = snap.val();

            if (m.creator_claim && m.joiner_claim && m.status === 'waiting') {
                // Case 1: Creator Wins, Joiner Losses
                if (m.creator_claim === 'win' && m.joiner_claim === 'loss') {
                    await finalizeMatch(matchId, m.creatorId, m.prize);
                } 
                // Case 2: Creator Losses, Joiner Wins
                else if (m.creator_claim === 'loss' && m.joiner_claim === 'win') {
                    await finalizeMatch(matchId, m.joinerId, m.prize);
                } 
                // Case 3: Dispute (Both win or Both loss)
                else {
                    await update(matchRef, { status: 'dispute' });
                }
            }
        }

        async function finalizeMatch(matchId, winnerId, prize) {
            const winnerRef = ref(db, `users/${winnerId}/balance`);
            
            // Atomically update balance
            await runTransaction(winnerRef, (currentBalance) => {
                return (currentBalance || 0) + parseFloat(prize);
            });

            await update(ref(db, `matches/${matchId}`), {
                status: 'completed',
                winnerId: winnerId,
                paid: true,
                completedTime: Date.now()
            });
        }

        // --- Standard Functions ---
        window.joinMatch = (id, fee) => {
            if (userBalance < fee) return alert("ब्यालेन्स पुगेन!");
            if (confirm(`रू ${fee} तिरेर म्याच ज्वाइन गर्ने?`)) {
                update(ref(db), {
                    [`matches/${id}/status`]: 'waiting',
                    [`matches/${id}/joinerId`]: userUid,
                    [`users/${userUid}/balance`]: userBalance - fee
                }).then(() => { alert("Join सफल!"); showTab('waiting'); });
            }
        };

        window.openChat = (matchId) => {
            activeChatId = matchId;
            document.getElementById('chatModal').style.display = 'flex';
            const msgContainer = document.getElementById('chatMessages');
            onValue(ref(db, `matches/${matchId}/messages`), (snapshot) => {
                msgContainer.innerHTML = "";
                const data = snapshot.val();
                if(data) {
                    Object.values(data).forEach(m => {
                        msgContainer.innerHTML += `<div class="msg ${m.senderId === userUid ? 'sent' : 'received'}">${m.text}</div>`;
                    });
                    msgContainer.scrollTop = msgContainer.scrollHeight;
                }
            });
        };

        window.closeChat = () => {
            if(activeChatId) off(ref(db, `matches/${activeChatId}/messages`));
            document.getElementById('chatModal').style.display = 'none';
        };

        document.getElementById('sendMsgBtn').onclick = () => {
            const input = document.getElementById('chatInput');
            if(!input.value.trim() || !activeChatId) return;
            push(ref(db, `matches/${activeChatId}/messages`), { senderId: userUid, text: input.value, time: Date.now() });
            input.value = "";
        };

        window.copyCode = (code) => { navigator.clipboard.writeText(code).then(() => alert("Code कपी भयो!")); };

    </script>
</body>
</html>
